<!doctype html>
<html lang="en">
  <head>
    <!-- ✅ Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Title (VERY IMPORTANT for SEO) -->
    <title>AI Resume Analyzer | ATS Optimization Tool | TatvaMind</title>

    <!-- ✅ Description -->
    <meta
      name="description"
      content="Analyze your resume with AI. Improve ATS score, identify missing keywords, and optimize your resume for job applications using TatvaMind AI Career Engine."
    />

    <!-- ✅ Keywords -->
    <meta
      name="keywords"
      content="AI resume analyzer, ATS resume checker, resume optimization, job matching AI, resume scoring, TatvaMind"
    />

    <!-- ✅ Author -->
    <meta name="author" content="TatvaMind Labs" />

    <!-- ✅ Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- ✅ Fonts -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Roboto:wght@300;400;500&display=swap"
      rel="stylesheet"
    />

    <!-- ✅ Open Graph (Social Sharing) -->
    <meta property="og:title" content="AI Resume Analyzer - TatvaMind" />
    <meta
      property="og:description"
      content="Optimize your resume using AI. Get ATS score, keyword insights, and job-specific suggestions."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="/preview.png" />

    <!-- ✅ Twitter Cards -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AI Resume Analyzer - TatvaMind" />
    <meta
      name="twitter:description"
      content="Boost your resume with AI-powered ATS optimization."
    />
    <meta name="twitter:image" content="/preview.png" />

    <!-- ✅ Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- ✅ Robots -->
    <meta name="robots" content="index, follow" />

    <!-- ✅ Theme Color -->
    <meta name="theme-color" content="#2563eb" />

    <!-- ✅ Structured Data (VERY POWERFUL FOR SEO) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "TatvaMind AI Resume Analyzer",
        "url": "https://yourdomain.com",
        "applicationCategory": "BusinessApplication",
        "operatingSystem": "All",
        "description": "AI-powered resume analyzer to optimize resumes for ATS systems and improve job application success.",
        "creator": {
          "@type": "Organization",
          "name": "TatvaMind Labs"
        }
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
